<!DOCTYPE html>
<html>
    <head>
        <title>Weather App</title>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width initil-scale=1.0">
        <link rel = "stylesheet" href = "style.css">
    </head>
    <body>
        <script src = "script.js"></script>
        <div class = "container">
            <div class = "sidebar">
                <img src = "icon.png" height = "40px" width = "40px">
                <div class = "nav-item active">
                    <i data-lucide = "cloud-sun"></i>
                    <span>Weather</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="building-2"></i>
                    <span>Cities</span>
                </div>
                <div class="nav-item">
                    <i data-lucide ="map"></i>
                    <span>Map</span>
                </div>
                <div class="nav-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </div>
            </div>
            <div class = "main-content">
                <input type="text" placeholder="City">
                <div class = "weather-info"></div>
                <div class = "hourly-forecast"></div>
                <div class = "air-conditions"></div>
            </div>
            <div class = "forecast">
                <div class="forecast-items"></div>
            </div>
        </div>
        <script src = "https://unpkg.com/lucide@latest"></script>
        <script>
                lucide.createIcons();
        </script>
    </body>
</html>
